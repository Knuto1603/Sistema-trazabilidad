<div class="fixed inset-0 z-9999 flex items-center justify-center bg-slate-50/90 backdrop-blur-sm transition-opacity duration-300">
      <div class="flex flex-col items-center animate-pulse">
        <!-- Logo Corporativo -->
        <div class="w-20 h-20 bg-white rounded-2xl flex items-center justify-center shadow-xl mb-6 p-2">
          <img 
            src="/logo-itfp/logo-small.webp" 
            alt="Cargando..." 
            class="w-full h-full object-contain"
            onerror="this.style.display='none'"
          >
        </div>
        
        <!-- Texto Personalizable -->
        <p class="text-slate-800 font-bold text-lg tracking-wider uppercase">{{ message }}</p>
        <p class="text-blue-500 text-xs font-semibold tracking-[0.3em] uppercase mt-1">Interfruits Perú</p>
        
        <!-- Indicador visual extra -->
        <div class="mt-6 flex gap-2">
          <span class="w-2 h-2 bg-blue-600 rounded-full animate-bounce [animation-delay:-0.3s]"></span>
          <span class="w-2 h-2 bg-blue-600 rounded-full animate-bounce [animation-delay:-0.15s]"></span>
          <span class="w-2 h-2 bg-blue-600 rounded-full animate-bounce"></span>
        </div>
      </div>
</div>
