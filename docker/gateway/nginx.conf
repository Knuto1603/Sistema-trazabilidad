server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /security/* → App Security
    location /security/ {
        proxy_pass http://nginx-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120;
        client_max_body_size 20M;
    }

    # Proxy /api/* → App Core
    location /api/ {
        proxy_pass http://nginx-api:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120;
        client_max_body_size 20M;
    }

    # JS: sin cache agresivo + sub_filter para reemplazar URLs hardcodeadas
    location ~* \.js$ {
        gzip off;
        sub_filter_types application/javascript text/javascript;
        sub_filter_once off;
        sub_filter 'https://127.0.0.1:8000/api' '/security/api';
        sub_filter 'https://127.0.0.1:8001/api' '/api';
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Otros assets estaticos
    location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html — nunca cachear
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
