<app-loading-screen 
*ngIf="isCheckingSession()"
message="Cargando..."
></app-loading-screen>

<div class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
  
  <!-- Tarjeta Principal -->
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
    
    <!-- Encabezado con Logo -->
    <div class="bg-slate-900 px-8 py-10 flex flex-col items-center justify-center text-center relative overflow-hidden">
      <!-- Decoración de fondo -->
      <div class="absolute inset-0 bg-blue-600/10 blur-3xl rounded-full scale-150 translate-y-10"></div>
      
      <div class="w-24 h-24 bg-white rounded-2xl flex items-center justify-center shadow-lg mb-4 z-10 p-2">
        <img 
          src="/logo-itfp/logo-small.webp" 
          alt="Interfruits Logo" 
          class="w-full h-full object-contain"
          onerror="this.src='https://ui-avatars.com/api/?name=I&background=0f172a&color=fff'"
        >
      </div>
      
      <h2 class="text-2xl font-black text-white uppercase tracking-tight z-10">Interfruits Perú</h2>
      <p class="text-blue-200 text-sm font-medium tracking-widest uppercase mt-1 z-10">Portal de Trazabilidad</p>
    </div>

    <!-- Formulario -->
    <div class="p-8">
      
      <!-- Mensaje de Error -->
      <div *ngIf="errorMessage()" class="mb-6 p-4 rounded-lg bg-red-50 border border-red-100 flex items-center gap-3 text-red-700 animate-in fade-in slide-in-from-top-2">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span class="text-sm font-medium">{{ errorMessage() }}</span>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
        
        <!-- Campo Usuario/Correo -->
        <div class="space-y-1.5">
          <label for="username" class="block text-sm font-bold text-slate-700">Usuario o Correo</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </div>
            <input 
              id="username" 
              type="text" 
              formControlName="username"
              class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm font-medium text-slate-900 placeholder-slate-400 transition-colors"
              [class.border-red-300]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
              placeholder="Ingresa tu usuario"
            >
          </div>
          <p *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" class="text-xs text-red-500 font-semibold pl-1">
            El usuario es requerido.
          </p>
        </div>

        <!-- Campo Contraseña -->
        <div class="space-y-1.5">
          <label for="password" class="block text-sm font-bold text-slate-700">Contraseña</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <input 
              id="password" 
              [type]="showPassword() ? 'text' : 'password'" 
              formControlName="password"
              class="block w-full pl-10 pr-10 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm font-medium text-slate-900 placeholder-slate-400 transition-colors"
              [class.border-red-300]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
              placeholder="••••••••"
            >
            <button 
              type="button" 
              (click)="togglePassword()"
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 transition-colors focus:outline-none"
            >
              <svg *ngIf="!showPassword()" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
              <svg *ngIf="showPassword()" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path></svg>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between pt-2">
          <div class="flex items-center">
            <input id="remember-me" type="checkbox"
              [checked]="rememberMe()"
              (change)="rememberMe.set($any($event.target).checked)"
              class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded cursor-pointer">
            <label for="remember-me" class="ml-2 block text-xs text-slate-600 cursor-pointer select-none">Recordarme</label>
          </div>
          <div class="text-xs">
            <a href="#" class="font-medium text-blue-600 hover:text-blue-500">¿Olvidaste tu contraseña?</a>
          </div>
        </div>

        <!-- Botón Submit -->
        <button 
          type="submit" 
          [disabled]="loginForm.invalid || isLoading()"
          class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
        >
          <span *ngIf="!isLoading()">INICIAR SESIÓN</span>
          
          <!-- Spinner de carga -->
          <svg *ngIf="isLoading()" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>
      </form>
    </div>

    <!-- Footer de la tarjeta -->
    <div class="bg-slate-50 px-8 py-4 border-t border-slate-100 flex justify-center">
      <p class="text-xs text-slate-500">
        &copy; 2026 Interfruits Perú S.A.C.
      </p>
    </div>
  </div>
</div>
