services:

  # ─── Gateway: Angular SPA + proxy a las APIs ───────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: docker/gateway/Dockerfile
    networks:
      - app-network
      - easypanel
    labels:
      traefik.enable: "true"
      traefik.http.routers.trazabilidad-gateway.rule: "Host(`${DOMAIN}`)"
      traefik.http.routers.trazabilidad-gateway.entrypoints: "https"
      traefik.http.routers.trazabilidad-gateway.tls: "true"
      traefik.http.routers.trazabilidad-gateway.tls.certresolver: "letsencrypt"
      traefik.http.services.trazabilidad-gateway.loadbalancer.server.port: "80"
    depends_on:
      - nginx-api
    restart: unless-stopped

  # ─── Nginx API: reverse proxy a los dos apps Symfony ───────────────────────
  nginx-api:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx-api/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  # ─── Backend: PHP 8.2-FPM (ambas apps Symfony comparten el mismo proceso) ──
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      SECURITY_DATABASE_URL: ${SECURITY_DATABASE_URL}
      CORE_DATABASE_URL: ${CORE_DATABASE_URL}
      JWT_PRIVATE_KEY_BASE64: ${JWT_PRIVATE_KEY_BASE64}
      JWT_PUBLIC_KEY_BASE64: ${JWT_PUBLIC_KEY_BASE64}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      JWT_SECRET_KEY: /var/www/html/config/jwt/private.pem
      JWT_PUBLIC_KEY: /var/www/html/config/jwt/public.pem
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # ─── Base de datos MySQL 8.0 ────────────────────────────────────────────────
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
  easypanel:
    external: true

volumes:
  db-data:
